<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2 Exercises for CSS Basics</title>
    <style>
        .request-now {
            background-color: black;
            color: white;
            border: none;
            height: 40px;
            width: 130px;
        }
        .add-to-cart {
            background-color: rgb(255, 216, 20);
            color: black;
            border: none;
            border-radius: 15px;
            height: 30px;
            width: 150px;
        }
        .sign-up {
            background-color: rgb(46, 164, 79);
            color: white;
            font-weight: bold;
            border: none;
            height: 36px;
            width: 90px;
            border-radius: 6px;
        }
        .get-started {
            background-color: rgb(121, 82, 179);
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            height: 36px;
            width: 100px;
            margin-right: 6px;
        }
        .download {
            background-color: white;
            color: rgb(108, 117, 125);
            font-weight: bold;
            border-width: 1.5px;
            border-style: solid;
            border-color: rgb(108, 117, 125);
            border-radius: 4px;
            height: 36px;
            width: 100px;
        }
        .apply {
            background-color: rgb(10, 102, 194);
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            height: 40px;
            width: 220px;
            margin-right: 8px;
        }
        .save {
            background-color: white;
            color: rgb(10, 102, 194);
            font-weight: bold;
            border-color: rgb(10, 102, 194);
            border-style: solid;
            border-radius: 20px;
            height: 40px;
            width: 70px;
        }
    </style>
</head>
<body>
    <p>2a. Uber</p>
    <button class="request-now">Request Now</button>
    <br><br>

    <p>2b. Amazon</p>
    <button class="add-to-cart">Add to Cart</button>
    <br><br>

    <p>2c. GitHub</p>
    <button class="sign-up">Sign up</button>
    <br><br>

    <p>2d. Bootstrap</p>
    <button class="get-started">Get started</button>
    <button class="download">Download</button>
    <br><br>

    <p>2e. LinkedIn</p>
    <button class="apply">Apply on company website</button>
    <button class="save">Save</button>
    <br><br>

</body>
</html>
