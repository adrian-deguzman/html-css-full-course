<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .back-to-amazon {
            color: rgb(0, 113, 133);
        }
        .product-name {
            font-size: 30px;
            font-weight: bold;
        }
        .price {
            color: rgb(0, 118, 0);
            font-weight: bold;
        }
        .add-to-cart {
            background-color: rgb(255, 216, 20);
            color: black;
            height: 30px;
            width: 110px;
            border: none;
            border-radius: 15px;
            margin-right: 8px;
        }
        .buy-now {
            background-color: rgb(255, 164, 28);
            color: black;
            height: 30px;
            width: 100px;
            border: none;
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <a href="https://www.amazon.com/" target="_blank" class="back-to-amazon">Back to Amazon</a>
    <p class="product-name">Nike Black Running Shoes</p>
    <p class="price">$39 - in stock.</p>
    <p>Free delivery tomorrow.</p>
    <button class="add-to-cart">Add to Cart</button>
    <button class="buy-now">Buy now</button>
</body>
</html>
