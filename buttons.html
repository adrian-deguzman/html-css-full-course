<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .subscribe-button {
        background-color: rgb(209, 0, 0);
        color: white;
        border: none;
        height: 36px;
        width: 105px;
        border-radius: 2px;
        cursor: pointer;
        margin-right: 8px;
        transition: opacity 0.15s;
      }

      .subscribe-button:hover {
        opacity: 0.7;
      }

      .subscribe-button:active {
        opacity: 0.5;
      }

      .join-button {
        background-color: white;
        color: rgb(41, 118, 211);
        height: 36px;
        width: 62px;
        border-width: 1px;
        border-style: solid;
        border-color: rgb(41, 118, 211);
        border-radius: 2px;
        cursor: pointer;
        margin-right: 8px;
        transition:
          background-color 0.15s,
          color 0.15s;
      }

      .join-button:hover {
        background-color: rgb(41, 118, 211);
        color: white;
      }

      .join-button:active {
        opacity: 0.7;
      }

      .tweet-button {
        background-color: rgb(0, 148, 254);
        color: white;
        font-weight: bold;
        font-size: 15px;
        height: 36px;
        width: 70px;
        border: none;
        border-radius: 18px;
        margin-right: 8px;
        cursor: pointer;
        transition:
          box-shadow 0.15s,
          opacity 0.15s;
      }

      .tweet-button:hover {
        box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.15);
      }

      .tweet-button:active {
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <button class="subscribe-button">SUBSCRIBE</button>
    <button class="join-button">JOIN</button>
    <button class="tweet-button">Tweet</button>
  </body>
</html>
