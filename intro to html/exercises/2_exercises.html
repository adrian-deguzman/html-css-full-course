<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2 Exercises for CSS Basics</title>
    <style>
      .request-now {
        background-color: black;
        color: white;
        border: none;
        height: 40px;
        width: 130px;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      .request-now:hover {
        opacity: 0.7;
      }

      .request-now:active {
        opacity: 0.5;
      }

      .add-to-cart {
        background-color: rgb(255, 216, 20);
        color: black;
        border: none;
        border-radius: 15px;
        height: 30px;
        width: 150px;
        cursor: pointer;
        transition: background-color 0.15s;
      }

      .add-to-cart:hover {
        background-color: rgb(206, 171, 0);
      }

      .add-to-cart:active {
        background-color: rgb(165, 138, 0);
      }

      .sign-up {
        background-color: rgb(46, 164, 79);
        color: white;
        font-weight: bold;
        border: none;
        height: 36px;
        width: 90px;
        border-radius: 6px;
        cursor: pointer;
        transition: box-shadow 0.15s;
      }

      .sign-up:hover {
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.15);
      }

      .get-started {
        background-color: rgb(121, 82, 179);
        color: white;
        font-weight: bold;
        border: none;
        border-radius: 4px;
        height: 36px;
        width: 100px;
        margin-right: 6px;
        cursor: pointer;
        transition: background-color 0.15s;
      }

      .get-started:hover {
        background-color: rgb(101, 62, 161);
      }

      .get-started:active {
        background-color: rgb(74, 41, 123);
      }

      .download {
        background-color: white;
        color: rgb(108, 117, 125);
        font-weight: bold;
        border-width: 1.5px;
        border-style: solid;
        border-color: rgb(108, 117, 125);
        border-radius: 4px;
        height: 36px;
        width: 100px;
        cursor: pointer;
        transition:
          background-color 0.15s,
          color 0.15s;
      }

      .download:hover {
        background-color: rgb(108, 117, 125);
        color: white;
      }

      .download:active {
        background-color: rgb(80, 88, 96);
      }

      .apply {
        background-color: rgb(10, 102, 194);
        color: white;
        font-weight: bold;
        border: none;
        border-radius: 20px;
        height: 40px;
        width: 220px;
        margin-right: 8px;
        cursor: pointer;
        transition: background-color 0.15s;
      }

      .apply:hover {
        background-color: rgb(5, 83, 160);
      }

      .apply:active {
        background-color: rgb(4, 68, 132);
      }

      .save {
        background-color: white;
        color: rgb(10, 102, 194);
        font-weight: bold;
        border-color: rgb(10, 102, 194);
        border-style: solid;
        border-width: 1.5px;
        border-radius: 20px;
        height: 40px;
        width: 70px;
        cursor: pointer;
        transition:
          background-color 0.15s,
          border-width 0.15s;
      }

      .save:hover {
        background-color: rgb(224, 239, 255);
        border-width: 2px;
      }

      .save:active {
        background-color:  rgb(199, 226, 255);
      }
    </style>
  </head>
  <body>
    <p>2a. Uber</p>
    <button class="request-now">Request Now</button>
    <br /><br />

    <p>2b. Amazon</p>
    <button class="add-to-cart">Add to Cart</button>
    <br /><br />

    <p>2c. GitHub</p>
    <button class="sign-up">Sign up</button>
    <br /><br />

    <p>2d. Bootstrap</p>
    <button class="get-started">Get started</button>
    <button class="download">Download</button>
    <br /><br />

    <p>2e. LinkedIn</p>
    <button class="apply">Apply on company website</button>
    <button class="save">Save</button>
    <br /><br />
  </body>
</html>
